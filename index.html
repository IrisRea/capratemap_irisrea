<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>REIT保有物件マップ（α）</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
:root{--bg:#f6f7f4;--panel:#ffffff;--ink:#263238;--muted:#63717a;--line:#d8ded8;--pin:#0b7285;--pin-selected:#d9480f;--cluster:#315f72;--accent:#2f6f4e;--shadow:0 14px 32px rgba(29,43,48,.14)}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:"Yu Gothic UI","Hiragino Sans","Meiryo",sans-serif;color:var(--ink);background:var(--bg);overflow:hidden}.app{height:100%;display:grid;grid-template-columns:380px minmax(0,1fr)}.map-wrap{position:relative;min-width:0;order:2}#map{height:100%;width:100%}.topbar{position:absolute;z-index:600;top:14px;left:64px;width:330px;display:flex;align-items:center;pointer-events:none}.search{pointer-events:auto;width:330px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.96);border:1px solid var(--line);box-shadow:var(--shadow);padding:8px;border-radius:8px}.search input{width:100%;height:36px;border:1px solid #c9d2cc;border-radius:6px;padding:0 11px;font-size:14px;color:var(--ink);background:#fff}.search button{height:36px;border:0;border-radius:6px;background:var(--accent);color:#fff;font-weight:700;padding:0 14px;cursor:pointer;white-space:nowrap}.search button:disabled{opacity:.65;cursor:wait}.sidebar{height:100%;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0;min-height:0;order:1}.side-head{padding:18px 18px 14px;border-bottom:1px solid var(--line);flex:0 0 auto}.side-head h1{font-size:19px;line-height:1.35;margin:0}.details{flex:1 1 auto;min-height:0;padding:18px;overflow-y:auto;overflow-x:hidden}.empty{min-height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;line-height:1.7;padding:20px}.property-title{margin:0 0 14px;font-size:21px;line-height:1.35}.kv{display:grid;grid-template-columns:144px minmax(0,1fr);gap:0;border-top:1px solid var(--line)}.kv dt,.kv dd{margin:0;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.45}.kv dt{color:var(--muted);padding-right:10px}.kv dd{word-break:break-word}.point-marker{width:24px;height:24px;background:var(--pin);border:2px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 5px 13px rgba(0,0,0,.28)}.point-marker:after{content:"";position:absolute;width:8px;height:8px;border-radius:50%;background:#fff;top:6px;left:6px}.point-marker.is-selected{width:28px;height:28px;background:var(--pin-selected)}.point-marker.is-selected:after{width:10px;height:10px;top:7px;left:7px}.cluster-marker{width:42px;height:42px;border-radius:50%;background:var(--cluster);border:3px solid rgba(255,255,255,.95);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;box-shadow:0 8px 18px rgba(0,0,0,.22)}.leaflet-tooltip.property-tip{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:0 8px 20px rgba(0,0,0,.14);font-size:12px}.leaflet-control-attribution{font-size:11px}.search-results{position:absolute;z-index:650;top:64px;left:64px;width:330px;max-height:280px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);display:none}.search-results button{display:block;width:100%;border:0;background:#fff;text-align:left;padding:10px 12px;cursor:pointer;border-bottom:1px solid #eef1ee;color:var(--ink)}.search-results button:hover{background:#eef6f1}.search-results .muted{color:var(--muted);font-size:12px;margin-top:2px}@media (max-width:980px){.app{grid-template-columns:1fr;grid-template-rows:330px minmax(0,1fr)}.sidebar{order:1;border-right:0;border-bottom:1px solid var(--line)}.map-wrap{order:2}.topbar{left:64px;width:min(330px,calc(100% - 78px))}.search{width:100%}.search-results{left:64px;width:min(330px,calc(100% - 78px))}.kv{grid-template-columns:124px minmax(0,1fr)}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="side-head"><h1>REIT保有物件マップ（α）</h1></div>
    <div class="details" id="details"><div class="empty">ピンをクリックすると<br>物件情報を表示します</div></div>
  </aside>
  <div class="map-wrap">
    <div id="map"></div>
    <div class="topbar">
      <form class="search" id="searchForm">
        <input id="addressInput" autocomplete="off" placeholder="住所または物件名で移動">
        <button id="searchButton" type="submit">検索</button>
      </form>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="./guarded-data/boot.js"></script>
<script>
const DETAIL_CHUNK_SIZE=100;
const DETAIL_CHUNK_KEYS=["p00","p01","p02","p03","p04","p05","p06","p07","p08","p09","p10","p11","p12","p13","p14","p15","p16","p17","p18","p19","p20","p21","p22","p23","p24","p25","p26","p27","p28","p29","p30","p31","p32","p33","p34","p35","p36","p37","p38","p39","p40","p41","p42","p43","p44","p45","p46","p47","p48"];
const decodePayload=(key)=>{const bag=window.__PG_PAYLOADS||{};const b64=bag[key];if(!b64)return null;const bin=atob(b64);const bytes=Uint8Array.from(bin,ch=>ch.charCodeAt(0));return JSON.parse(new TextDecoder().decode(bytes))};
const prime=decodePayload('b')||[];
const PROPERTIES=prime.map(item=>({id:item.i,name:item.n,lat:item.x,lng:item.y}));
const DETAIL_CACHE=new Map();
const LOADED_CHUNKS=new Set();
const CLUSTER_THRESHOLD=20;
const GRID_SIZE=52;
const esc=(s)=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ui={title:'\u4E0D\u52D5\u7523\u9274\u5B9A\u8A55\u4FA1\u30DE\u30C3\u30D7',detailLoading:'\u8A73\u7D30\u30C7\u30FC\u30BF\u3092\u8AAD\u307F\u8FBC\u307F\u4E2D\u3067\u3059',detailError:'\u8A73\u7D30\u306E\u8AAD\u307F\u8FBC\u307F\u306B\u5931\u6557\u3057\u307E\u3057\u305F',searchFallback:'\u5019\u88DC\u3092\u30AF\u30EA\u30C3\u30AF\u3059\u308B\u3068\u8A73\u7D30\u3092\u8AAD\u307F\u8FBC\u307F\u307E\u3059',addressError:'\u4F4F\u6240\u691C\u7D22\u306B\u5931\u6557\u3057\u307E\u3057\u305F',addressMiss:'\u4F4F\u6240\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093\u3067\u3057\u305F',clusterSuffix:'\u4EF6\u306E\u7269\u4EF6',attr:'\u5730\u56F3: <a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noreferrer">\u56FD\u571F\u5730\u7406\u9662</a>'};
const map=L.map('map',{preferCanvas:true,zoomControl:true}).setView([36.3,138.2],5);
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png',{maxZoom:18,attribution:ui.attr}).addTo(map);
const layer=L.layerGroup().addTo(map);
const detailsEl=document.getElementById('details');
const resultsEl=document.getElementById('searchResults');
let selectedId=null;
function fmt(v){return v&&String(v).trim()?esc(v):'<span style="color:#8a969c">-</span>'}
function fmtRate(v){const s=String(v??'').trim();if(!s)return'<span style="color:#8a969c">-</span>';const n=Number(s);return Number.isFinite(n)?n.toFixed(1):esc(s)}
function detailChunkKeyForId(id){const idx=Math.floor((Number(id)-1)/DETAIL_CHUNK_SIZE);return DETAIL_CHUNK_KEYS[idx]||null}
async function loadDetailChunk(chunkKey){
  if(!chunkKey)return;
  if(LOADED_CHUNKS.has(chunkKey))return;
  await new Promise((resolve,reject)=>{
    const script=document.createElement('script');
    script.src='./guarded-data/'+chunkKey+'.js';
    script.onload=()=>{LOADED_CHUNKS.add(chunkKey);resolve()};
    script.onerror=()=>reject(new Error(ui.detailError));
    document.head.appendChild(script);
  });
}
async function getDetail(id){
  if(DETAIL_CACHE.has(id))return DETAIL_CACHE.get(id);
  const chunkKey=detailChunkKeyForId(id);
  await loadDetailChunk(chunkKey);
  const payload=decodePayload(chunkKey);
  if(payload){
    Object.entries(payload).forEach(([k,v])=>DETAIL_CACHE.set(Number(k),v));
    delete window.__PG_PAYLOADS[chunkKey];
  }
  return DETAIL_CACHE.get(id)||null;
}
function renderDetailBody(property,detail){
  return '<h2 class="property-title">'+esc(property.name)+'</h2><dl class="kv"><dt>\u9451\u5B9A\u8A55\u4FA1\u984D(\u5186)</dt><dd>'+fmt(detail?.p)+'</dd><dt>\u9084\u5143\u5229\u56DE\u308A(\uff05)</dt><dd>'+fmtRate(detail?.c)+'</dd><dt>\u5272\u5F15\u7387(\uff05)</dt><dd>'+fmtRate(detail?.d)+'</dd><dt>\u6700\u7D42\u9084\u5143\u5229\u56DE\u308A(\uff05)</dt><dd>'+fmtRate(detail?.t)+'</dd><dt>\u8A55\u4FA1\u6642\u70B9</dt><dd>'+fmt(detail?.v)+'</dd><dt>\u53D6\u5F97\u4FA1\u683C(\u5186)</dt><dd>'+fmt(detail?.g)+'</dd><dt>\u53D6\u5F97\u6642\u671F</dt><dd>'+fmt(detail?.o)+'</dd><dt>\u7528\u9014</dt><dd>'+fmt(detail?.u)+'</dd><dt>\u69CB\u9020\u968E\u6570</dt><dd>'+fmt(detail?.s)+'</dd><dt>\u5EFA\u7BC9\u6642\u671F</dt><dd>'+fmt(detail?.b)+'</dd><dt>\u5730\u7A4D(\u33A1)</dt><dd>'+fmt(detail?.e)+'</dd><dt>\u5EF6\u5E8A\u9762\u7A4D(\u33A1)</dt><dd>'+fmt(detail?.f)+'</dd><dt>\u571F\u5730\u306E\u6240\u6709\u5F62\u614B</dt><dd>'+fmt(detail?.l)+'</dd><dt>\u5EFA\u7269\u306E\u6240\u6709\u5F62\u614B</dt><dd>'+fmt(detail?.h)+'</dd><dt>\u8CC3\u8CB8\u53EF\u80FD\u9762\u7A4D(\u33A1)</dt><dd>'+fmt(detail?.m)+'</dd><dt>\u6295\u8CC7\u6CD5\u4EBA\u540D</dt><dd>'+fmt(detail?.r)+'</dd></dl>';
}
async function renderDetails(property){
  selectedId=property.id;
  detailsEl.innerHTML='<h2 class="property-title">'+esc(property.name)+'</h2><div class="empty">'+ui.detailLoading+'</div>';
  renderMarkers();
  try{
    const detail=await getDetail(property.id);
    if(selectedId!==property.id)return;
    detailsEl.innerHTML=renderDetailBody(property,detail);
  }catch(error){
    if(selectedId!==property.id)return;
    detailsEl.innerHTML='<h2 class="property-title">'+esc(property.name)+'</h2><div class="empty">'+esc(error.message||ui.detailError)+'</div>';
  }
}
function makePoint(property){
  const selected=property.id===selectedId;
  const size=selected?28:24;
  const icon=L.divIcon({className:'',html:'<div class="point-marker '+(selected?'is-selected':'')+'"></div>',iconSize:[size,size],iconAnchor:[size/2,size],popupAnchor:[0,-size]});
  const marker=L.marker([property.lat,property.lng],{icon,riseOnHover:true});
  marker.bindTooltip(esc(property.name),{className:'property-tip',direction:'top',offset:[0,-24]});
  marker.on('click',()=>renderDetails(property));
  return marker;
}
function makeCluster(items){
  const lat=items.reduce((acc,item)=>acc+item.lat,0)/items.length;
  const lng=items.reduce((acc,item)=>acc+item.lng,0)/items.length;
  const icon=L.divIcon({className:'',html:'<div class="cluster-marker">'+items.length+'</div>',iconSize:[42,42],iconAnchor:[21,21]});
  const marker=L.marker([lat,lng],{icon});
  marker.on('click',()=>{const bounds=L.latLngBounds(items.map(item=>[item.lat,item.lng]));if(map.getZoom()<17){map.fitBounds(bounds,{padding:[42,42],maxZoom:map.getZoom()+3})}else{map.fitBounds(bounds,{padding:[42,42]})}});
  marker.bindTooltip(items.length+ui.clusterSuffix,{className:'property-tip',direction:'top',offset:[0,-18]});
  return marker;
}
function visibleProperties(){const bounds=map.getBounds().pad(.08);return PROPERTIES.filter(item=>bounds.contains([item.lat,item.lng]))}
function renderMarkers(){
  layer.clearLayers();
  const zoom=map.getZoom();
  const groups=new Map();
  for(const property of visibleProperties()){
    const point=map.project([property.lat,property.lng],zoom);
    const key=Math.floor(point.x/GRID_SIZE)+','+Math.floor(point.y/GRID_SIZE);
    if(!groups.has(key))groups.set(key,[]);
    groups.get(key).push(property);
  }
  for(const items of groups.values()){
    if(items.length>=CLUSTER_THRESHOLD){layer.addLayer(makeCluster(items))}else{for(const property of items)layer.addLayer(makePoint(property))}
  }
}
map.on('moveend zoomend',renderMarkers);
function fitAll(){const bounds=L.latLngBounds(PROPERTIES.map(item=>[item.lat,item.lng]));map.fitBounds(bounds,{padding:[28,28]})}
fitAll();
renderMarkers();
function localMatches(query){
  const needle=query.trim().toLowerCase();
  if(!needle)return[];
  return PROPERTIES.filter(item=>item.name.toLowerCase().includes(needle)).slice(0,8);
}
function showResults(items){
  if(!items.length){resultsEl.style.display='none';resultsEl.innerHTML='';return}
  resultsEl.innerHTML=items.map((item,index)=>'<button type="button" data-index="'+index+'"><strong>'+esc(item.name)+'</strong><div class="muted">'+ui.searchFallback+'</div></button>').join('');
  [...resultsEl.querySelectorAll('button')].forEach((button,index)=>button.addEventListener('click',()=>{resultsEl.style.display='none';renderDetails(items[index]);map.setView([items[index].lat,items[index].lng],17)}));
  resultsEl.style.display='block';
}
async function gsiSearch(query){
  const url='https://msearch.gsi.go.jp/address-search/AddressSearch?q='+encodeURIComponent(query);
  const res=await fetch(url);
  if(!res.ok)throw new Error(ui.addressError);
  return await res.json();
}
document.getElementById('addressInput').addEventListener('input',event=>showResults(localMatches(event.target.value)));
document.getElementById('searchForm').addEventListener('submit',async event=>{
  event.preventDefault();
  const query=document.getElementById('addressInput').value.trim();
  if(!query)return;
  const local=localMatches(query);
  if(local.length){renderDetails(local[0]);map.setView([local[0].lat,local[0].lng],17);resultsEl.style.display='none';return}
  const btn=document.getElementById('searchButton');
  btn.disabled=true;
  try{
    const hits=await gsiSearch(query);
    if(hits&&hits[0]&&hits[0].geometry&&hits[0].geometry.coordinates){
      const [lng,lat]=hits[0].geometry.coordinates;
      map.setView([lat,lng],16);
      L.popup().setLatLng([lat,lng]).setContent(esc(hits[0].properties?.title||query)).openOn(map);
    }else{
      L.popup().setLatLng(map.getCenter()).setContent(ui.addressMiss).openOn(map);
    }
  }catch(error){
    L.popup().setLatLng(map.getCenter()).setContent(esc(error.message||ui.addressError)).openOn(map);
  }finally{
    btn.disabled=false;
    setTimeout(renderMarkers,250);
  }
});
document.addEventListener('click',event=>{if(!resultsEl.contains(event.target)&&!document.getElementById('searchForm').contains(event.target))resultsEl.style.display='none'});
</script>
</body>
</html>
